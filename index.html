<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Torneos Brawl Stars - Sistema por fases</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tournament-container">
    <div class="card">
      <div class="card-header">
        // CONFIGURACION DEL TORNEO
      </div>
      <div class="form-group">
        <div class="input-field">
          <label>TIPO DE TORNEO</label>
          <select id="tournamentSizeSelect">
            <option value="4">4 jugadores</option>
            <option value="8" selected>8 jugadores</option>
            <option value="16">16 jugadores</option>
          </select>
        </div>
        <div class="input-field">
          <label>NOMBRE EN JUEGO</label>
          <input type="text" id="playerName" placeholder="Ej: Print-on">
        </div>
        <div class="input-field">
          <label>USUARIO TIKTOK</label>
          <input type="text" id="playerTikTok" placeholder="@Lopez" required>
        </div>
        <div class="input-field">
          <label>DESCRIPCION (opcional)</label>
          <input type="text" id="playerDesc" placeholder="Ej: Top de likes">
        </div>
        <button id="addPlayerBtn">+ INSCRIBIR</button>
      </div>

      <div class="players-list">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
          <strong>// JUGADORES INSCRITOS</strong>
          <div style="display: flex; gap: 1.5rem;">
            <span id="playerCountInfo" class="badge-count">0</span>
            <span id="eloProgressInfo" class="badge-count" style="border-color: #4A5B6E; color: #A0B0C8;">ELO: 0/0</span>
          </div>
        </div>
        <table class="players-table" id="playersTable">
          <thead>
            <tr><th>#</th><th>NOMBRE JUEGO</th><th>TIKTOK</th><th>DESCRIPCION</th><th>ELO</th><th></th></tr>
          </thead>
          <tbody id="playersTbody"></tbody>
        </table>
        <div style="display: flex; gap: 1rem; margin-top: 1rem; justify-content: flex-end;">
          <button id="resetPlayersBtn" class="secondary">LIMPIAR INSCRIPCIONES</button>
          <button id="generateBracketBtn" class="secondary" disabled>GENERAR BRACKETS (ELO PENDIENTE)</button>
        </div>
      </div>
    </div>

    <div class="card" id="bracketCard">
      <div class="card-header">
        // BRACKETS - ENFRENTAMIENTOS
      </div>
      <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
        <button id="clearWinnersBtn" class="secondary" style="border-color:#FF8C00; color:#FF8C00;">LIMPIAR GANADORES</button>
        <button id="regenerateBracketBtn" class="secondary" style="border-color:#00E5FF; color:#00E5FF;">REGENERAR BRACKETS</button>
      </div>
      <div id="bracketContent" class="brackets-view">
        <div class="empty-bracket">// INSCRIBIR JUGADORES Y ASIGNAR ELO //</div>
      </div>
    </div>

    <div style="text-align: center; margin-top: 1rem;">
      <button id="fullResetBtn" class="danger">REINICIAR TORNEO COMPLETO</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
